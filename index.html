<style>
  :root {
    --bg: #0A0E1A;
    --bg-2: #0F1424;
    --surface: #131A2D;
    --gold: #D4A857;
    --gold-bright: #F5C76E;
    --gold-deep: #B8893F;
    --gold-soft: rgba(212, 168, 87, .12);
    --gold-line: rgba(212, 168, 87, .22);
    --cream: #F5F0E8;
    --text: #E8E1D2;
    --text-muted: #8B92A8;
    --text-faint: #5A6178;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text); overflow-x: hidden; -webkit-font-smoothing: antialiased; padding-top: 56px; --fomo-h: 56px; transition: padding-top .3s ease, --fomo-h .3s ease; }
  @media (max-width: 600px) {
    body { padding-top: 96px; --fomo-h: 96px; }
  }
  body.fomo-hidden { padding-top: 0 !important; --fomo-h: 0px !important; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #2A2F45; border-radius: 3px; }

  .serif { font-family: 'Instrument Serif', serif; font-weight: 400; letter-spacing: -0.01em; }
  .gold-text {
    background: linear-gradient(135deg, #F5C76E 0%, #D4A857 50%, #B8893F 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .gold-shine {
    background: linear-gradient(110deg, #B8893F 0%, #F5C76E 25%, #FFF4D6 45%, #F5C76E 65%, #B8893F 100%);
    background-size: 200% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer-text 6s ease-in-out infinite;
  }
  .gold-btn {
    background: linear-gradient(135deg, #F5C76E 0%, #D4A857 50%, #B8893F 100%);
    color: #1A1206;
    position: relative;
    overflow: hidden;
    transition: all .35s cubic-bezier(.22,1,.36,1);
  }
  .gold-btn::after {
    content:''; position:absolute; inset:0;
    background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,.4) 50%, transparent 70%);
    background-size: 200% 100%;
    background-position: -100% 0;
    transition: background-position .8s;
  }
  .gold-btn:hover { transform: translateY(-2px); box-shadow: 0 14px 40px rgba(212,168,87,.4), 0 0 0 1px rgba(245,199,110,.5); }
  .gold-btn:hover::after { background-position: 200% 0; }

  .gold-btn-outline {
    background: transparent;
    border: 1.5px solid var(--gold-line);
    color: var(--gold);
    transition: all .3s ease;
  }
  .gold-btn-outline:hover {
    background: var(--gold-soft);
    border-color: var(--gold);
    color: var(--gold-bright);
  }

  .glass {
    background: rgba(19, 26, 45, .55);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(212, 168, 87, .1);
  }

  @keyframes shimmer-text { 0%,100%{background-position:0% 0} 50%{background-position:100% 0} }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  @keyframes gold-pulse { 0%,100%{box-shadow:0 0 24px rgba(212,168,87,.3)} 50%{box-shadow:0 0 48px rgba(212,168,87,.55)} }
  @keyframes draw-line { from{stroke-dashoffset:300} to{stroke-dashoffset:0} }
  @keyframes spin-slow { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

  .feature-card { transition: all .4s cubic-bezier(.25,.46,.45,.94); }
  .feature-card:hover {
    transform: translateY(-6px);
    border-color: rgba(212, 168, 87, .35) !important;
    box-shadow: 0 24px 60px rgba(0,0,0,.5), 0 0 0 1px rgba(212,168,87,.2);
  }

  /* Scroll reveal */
  .reveal { opacity:0; transform:translateY(40px); transition: opacity .8s cubic-bezier(.22,1,.36,1), transform .8s cubic-bezier(.22,1,.36,1); }
  .reveal.left { transform: translateX(-44px); }
  .reveal.right { transform: translateX(44px); }
  .reveal.scale { transform: scale(.94) translateY(20px); }
  .reveal.visible { opacity:1 !important; transform: none !important; }
  .d1{transition-delay:.08s!important}.d2{transition-delay:.16s!important}.d3{transition-delay:.24s!important}.d4{transition-delay:.32s!important}.d5{transition-delay:.4s!important}

  .chart-line { stroke-dasharray: 300; animation: draw-line 2.2s ease forwards; }

  /* Noise overlay */
  .noise::before {
    content:''; position:absolute; inset:0; pointer-events:none; opacity:.03; mix-blend-mode:overlay;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* Compass decorative ring */
  @keyframes rotate-ring { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .compass-ring { animation: rotate-ring 60s linear infinite; }

  /* FOMO Banner */
  @keyframes fomo-pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, .5); }
    50% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
  }
  @keyframes fomo-shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  .fomo-bg {
    background: linear-gradient(90deg, #B91C1C 0%, #DC2626 25%, #EA580C 50%, #DC2626 75%, #B91C1C 100%);
    background-size: 200% 100%;
    animation: fomo-shimmer 8s linear infinite;
  }
  .cta-pulse-ring {
    position: relative;
  }
  .cta-pulse-ring::before {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: inherit;
    border: 2px solid rgba(245, 199, 110, .6);
    animation: ring-expand 2s ease-out infinite;
    pointer-events: none;
  }
  @keyframes ring-expand {
    0% { transform: scale(.95); opacity: 1; }
    100% { transform: scale(1.15); opacity: 0; }
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 900px) {
    /* Navbar */
    .pk-nav-inner { height: 64px !important; padding: 0 !important; }
    .pk-nav-links { display: none !important; }
    .pk-nav-cta { padding: 8px 14px !important; font-size: 12px !important; }

    /* Hero */
    .pk-hero { padding: 100px 20px 60px !important; min-height: auto !important; }
    .pk-hero-grid { grid-template-columns: 1fr !important; gap: 48px !important; }
    .pk-hero-h1 { font-size: clamp(36px, 8vw, 48px) !important; }
    .pk-hero-buttons { flex-direction: column !important; align-items: stretch !important; }
    .pk-hero-buttons a, .pk-hero-buttons button { width: 100% !important; }
    .pk-hero-stats { gap: 24px !important; flex-wrap: wrap !important; }
    .pk-hero-stats > div { flex: 1 1 30% !important; min-width: 90px !important; }
    .pk-hero-mockup { transform: scale(.92); transform-origin: center; }

    /* Sections padding */
    .pk-section { padding: 80px 20px !important; }
    .pk-section-h2 { font-size: clamp(30px, 6.5vw, 40px) !important; }

    /* Features */
    .pk-features-grid { grid-template-columns: 1fr !important; gap: 16px !important; }
    .pk-feature-card { padding: 28px 24px !important; }
    .pk-compare-grid { grid-template-columns: 1fr !important; gap: 16px !important; }

    /* Method */
    .pk-method-grid { grid-template-columns: 1fr !important; gap: 40px !important; }
    .pk-method-line { display: none !important; }

    /* Testimonials */
    .pk-test-grid { grid-template-columns: 1fr !important; gap: 16px !important; }

    /* Pricing */
    .pk-pricing-grid { grid-template-columns: 1fr !important; gap: 20px !important; }
    .pk-pricing-pro { padding: 32px 24px !important; }
    .pk-pricing-pro-h { font-size: 32px !important; }
    .pk-price-amount { font-size: 50px !important; }
    .pk-pro-badge { font-size: 9.5px !important; padding: 5px 10px !important; }
    .pk-pricing-cta { font-size: 14px !important; padding: 15px 12px !important; }
    .pk-pricing-cta-text { font-size: 13px; }

    /* Final CTA */
    .pk-final-form { flex-direction: column !important; }
    .pk-final-form input, .pk-final-form button { width: 100% !important; }
    .pk-appstores { flex-direction: column !important; width: 100%; padding: 0 24px; }
    .pk-appstores > div { width: 100% !important; justify-content: center; }

    /* Footer */
    .pk-footer-inner { flex-direction: column !important; gap: 18px !important; text-align: center; }
    .pk-footer-links { flex-wrap: wrap; justify-content: center; }

    /* Hero badge */
    .pk-hero-badge { font-size: 10px !important; }

    /* Compass rings */
    .pk-decor-ring { display: none; }

    /* Vertical accent lines */
    .pk-accent-line { display: none; }

    /* Tweaks panel */
    .pk-tweaks { right: 12px !important; left: 12px !important; bottom: 12px !important; width: auto !important; }
  }

  @media (max-width: 520px) {
    .pk-dashboard-tabs { flex-wrap: wrap; }
    .pk-dashboard { max-width: 100% !important; }
    .pk-dashboard-content { height: auto !important; min-height: 320px; }
    .pk-rota-grid { grid-template-columns: 1fr !important; }
    .pk-hero-stats > div { flex: 1 1 45% !important; }
  }
</style>

<body>

<script type="text/babel">

const IconCalendar = ({size=22}) => (

const IconTarget = ({size=22}) => (

    <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>

const IconBrain = ({size=22}) => (

/* ─── COMPASS DECORATION ─── */
const CompassRing = ({size=280, opacity=.18}) => (
  <svg className="compass-ring" width={size} height={size} viewBox="0 0 200 200" style={{position:'absolute', opacity}}>
    <defs>
      <linearGradient id="ring-grad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stopColor="#F5C76E"/>
        <stop offset="50%" stopColor="#D4A857" stopOpacity=".3"/>
        <stop offset="100%" stopColor="#B8893F"/>
      </linearGradient>
    </defs>
    <circle cx="100" cy="100" r="95" fill="none" stroke="url(#ring-grad)" strokeWidth=".5"/>
    <circle cx="100" cy="100" r="80" fill="none" stroke="url(#ring-grad)" strokeWidth=".3" strokeDasharray="2 4"/>
    {Array.from({length:24}).map((_,i) => {
      const a = (i/24)*2*Math.PI;
      const x1 = 100 + Math.cos(a)*88, y1 = 100 + Math.sin(a)*88;
      const x2 = 100 + Math.cos(a)*(i%6===0?78:84), y2 = 100 + Math.sin(a)*(i%6===0?78:84);
      return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#D4A857" strokeWidth={i%6===0?1:.4} opacity=".6"/>;
    })}

    <text x="100" y="194" textAnchor="middle" fontSize="8" fill="#D4A857" fontFamily="Instrument Serif">G</text>

function AnalizView() {

/* ─── FOMO STICKY BANNER ─── */
const FOMO_CYCLES = [
  { duration: (12*60 + 43)*60*1000, start: 54,  end: 7 },
  { duration: 12*60*60*1000,         start: 100, end: 7 },
];
const FOMO_STORAGE_CYCLE = 'pkpss_fomo_cycle_v3';
const FOMO_STORAGE_END   = 'pkpss_fomo_end_v3';
const FOMO_STORAGE_DONE  = 'pkpss_fomo_done_v3';

function FomoBanner() {
  const [done, setDone] = useState(() => localStorage.getItem(FOMO_STORAGE_DONE) === '1');
  const [cycleIdx, setCycleIdx] = useState(() => Math.min(parseInt(localStorage.getItem(FOMO_STORAGE_CYCLE) || '0', 10), FOMO_CYCLES.length - 1));
  const [end, setEnd] = useState(() => {
    const stored = parseInt(localStorage.getItem(FOMO_STORAGE_END) || '0', 10);
    if (stored && stored > Date.now()) return stored;
    const idx = Math.min(parseInt(localStorage.getItem(FOMO_STORAGE_CYCLE) || '0', 10), FOMO_CYCLES.length - 1);
    const fresh = Date.now() + FOMO_CYCLES[idx].duration;
    localStorage.setItem(FOMO_STORAGE_END, String(fresh));
    return fresh;
  });
  const [now, setNow] = useState(Date.now());
  const [flash, setFlash] = useState(false);

  useEffect(() => {
    if (done) return;
    const tick = () => {
      const t = Date.now();
      setNow(t);
      if (t >= end && !flash) {
        if (cycleIdx + 1 >= FOMO_CYCLES.length) {
          localStorage.setItem(FOMO_STORAGE_DONE, '1');
          setDone(true);
          return;
        }
        setFlash(true);
        setTimeout(() => {
          const nextIdx = cycleIdx + 1;
          const newEnd = Date.now() + FOMO_CYCLES[nextIdx].duration;
          localStorage.setItem(FOMO_STORAGE_CYCLE, String(nextIdx));
          localStorage.setItem(FOMO_STORAGE_END, String(newEnd));
          setCycleIdx(nextIdx);
          setEnd(newEnd);
          setFlash(false);
          setNow(Date.now());
        }, 4000);
      }
    };
    tick();
    const id = setInterval(tick, 500);
    return () => clearInterval(id);
  }, [done, end, cycleIdx, flash]);

  if (done) {
    if (typeof document !== 'undefined') document.body.classList.add('fomo-hidden');
    return null;
  }
  if (typeof document !== 'undefined') document.body.classList.remove('fomo-hidden');

  const cycle = FOMO_CYCLES[cycleIdx];
  const remaining = Math.max(0, end - now);
  const elapsed = cycle.duration - remaining;
  const lastHour = 60 * 60 * 1000;
  let kontenjan;
  if (remaining <= lastHour) {
    // last hour: smoothly land at end value
    const localProgress = 1 - (remaining / lastHour);
    kontenjan = Math.max(cycle.end, Math.round(cycle.end + 2 - localProgress * 2));
  } else {
    const decayDuration = cycle.duration - lastHour;
    const progress = Math.min(1, elapsed / decayDuration);
    // ease-out so it drops fast early then slows
    const eased = 1 - Math.pow(1 - progress, 1.6);
    kontenjan = Math.max(cycle.end + 2, Math.round(cycle.start - (cycle.start - (cycle.end + 2)) * eased));
  }

  const pad = (n) => String(n).padStart(2, '0');
  const h = Math.floor(remaining / 3600000);
  const m = Math.floor((remaining % 3600000) / 60000);
  const s = Math.floor((remaining % 60000) / 1000);

  if (flash) {
    return (
      <div className="fomo-bg" style={fomoBarStyle}>
        <span style={{display:'inline-flex',alignItems:'center',gap:10, fontSize:14, fontWeight:700, letterSpacing:'.01em'}}>
          <span style={{fontSize:18, animation:'fomo-pulse 1s ease-in-out infinite'}}>⚡</span>
          Süre ve kontenjan artırıldı! <strong style={{fontWeight:800, color:'#FEF08A'}}>100 yeni kontenjan</strong> açıldı — sayaç yeniden başlıyor…
        </span>
      </div>
    );
  }

  return (
    <div className="fomo-bg" style={fomoBarStyle}>
      <span style={{display:'inline-flex',alignItems:'center',gap:8}}>
        <span style={{
          display:'inline-flex', width:22, height:22, borderRadius:'50%',
          background:'rgba(0,0,0,.25)', alignItems:'center', justifyContent:'center',
          animation:'fomo-pulse 1.8s ease-in-out infinite', fontSize:13
        }}>⚠️</span>
        <span style={{letterSpacing:'.005em'}}>2026 KPSS <strong style={{fontWeight:800}}>Kurucu Üye</strong> Fiyatı İçin Son:</span>
      </span>
      <span style={{
        display:'inline-flex', alignItems:'center', gap:6,
        background:'rgba(0,0,0,.35)', borderRadius:8, padding:'4px 12px',
        fontVariantNumeric:'tabular-nums', fontWeight:800, letterSpacing:'.04em',
        fontFamily:'JetBrains Mono, ui-monospace, monospace',
        border:'1px solid rgba(255,255,255,.18)'
      }}>
        <TimeChip n={pad(h)} label="SAAT"/>
        <span style={{opacity:.6}}>:</span>
        <TimeChip n={pad(m)} label="DK"/>
        <span style={{opacity:.6}}>:</span>
        <TimeChip n={pad(s)} label="SN"/>
      </span>
      <span style={{display:'inline-flex',alignItems:'center',gap:7, color:'#FEF3C7'}}>
        <span style={{width:7,height:7,borderRadius:'50%',background:'#FBBF24',boxShadow:'0 0 8px #FBBF24',animation:'fomo-pulse 1.5s ease-in-out infinite'}}/>
        <span>Kalan Kontenjan: <strong style={{color:'#FEF08A', fontWeight:800, fontVariantNumeric:'tabular-nums'}}>{kontenjan}</strong></span>
      </span>
    </div>
  );
}

/* ─── REVEAL HOOK ─── */
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); }});
    }, { threshold: 0.12 });
    els.forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);
}

/* ─── APP ─── */
function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = useState(false);
  useReveal();

  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  useEffect(() => {
    if (tweaksVisible) window.parent.postMessage({type:'__edit_mode_set_keys', edits: tweaks}, '*');
  }, [tweaks, tweaksVisible]);

  return (
    <>
      <Navbar tweaks={tweaks}/>
      <FomoBanner/>
      <Hero tweaks={tweaks}/>
      <PriceComparison tweaks={tweaks}/>
      <Features/>
      <Method/>
      <Testimonials/>
      <Pricing tweaks={tweaks}/>
      <FinalCTA tweaks={tweaks}/>
      <Footer/>
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksVisible}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
